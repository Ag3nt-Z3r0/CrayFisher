rules:

  # ── SQL Injection ────────────────────────────────────────────────────
  - id: js-sqli-string-concat
    message: "SQL Injection: query built via string concatenation (CWE-89)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-89"
      confidence: HIGH
    pattern-either:
      - pattern: $DB.query("..." + ...)
      - pattern: $DB.query(`...`)
      - pattern: $POOL.query("..." + ...)
      - pattern: $POOL.query(`...`)
      - pattern: $CLIENT.query("..." + ...)
      - pattern: $CLIENT.query(`...`)

  - id: js-sqli-knex-raw
    message: "SQL Injection: user input inserted into knex.raw() (CWE-89)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-89"
      confidence: HIGH
    pattern-either:
      - pattern: knex.raw(`...`)
      - pattern: knex.raw("..." + ...)
      - pattern: $DB.raw(`...`)

  # ── Command Injection ────────────────────────────────────────────────
  - id: js-cmdi-exec
    message: "Command Injection: user input passed to exec() (CWE-78)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-78"
      confidence: HIGH
    pattern-either:
      - pattern: exec(`...`)
      - pattern: exec("..." + ...)
      - pattern: execSync(`...`)
      - pattern: execSync("..." + ...)
      - pattern: child_process.exec(`...`)
      - pattern: child_process.exec("..." + ...)

  - id: js-cmdi-eval
    message: "Code Injection: user input executed via eval() (CWE-94)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-94"
      confidence: HIGH
    pattern-either:
      - pattern: eval(req.$X)
      - pattern: eval(req.body.$X)
      - pattern: eval(req.query.$X)
      - pattern: eval(req.params.$X)
      - pattern: new Function(req.$X)
      - pattern: new Function(req.body.$X)

  # ── Path Traversal ───────────────────────────────────────────────────
  - id: js-path-traversal-readfile
    message: "Path Traversal: file read using user input (CWE-22)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-22"
      confidence: HIGH
    pattern-either:
      - pattern: fs.readFile(req.params.$X, ...)
      - pattern: fs.readFile(req.query.$X, ...)
      - pattern: fs.readFile(req.body.$X, ...)
      - pattern: fs.readFileSync(req.params.$X, ...)
      - pattern: fs.readFileSync(req.query.$X, ...)
      - pattern: path.join($BASE, req.params.$X)
      - pattern: path.join($BASE, req.query.$X)

  # ── SSRF ─────────────────────────────────────────────────────────────
  - id: js-ssrf-fetch
    message: "SSRF: fetch request to a user-controlled URL (CWE-918)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-918"
      confidence: HIGH
    pattern-either:
      - pattern: fetch(req.params.$X)
      - pattern: fetch(req.query.$X)
      - pattern: fetch(req.body.$X)
      - pattern: fetch(`...${req.$X}...`)
      - pattern: axios.get(req.params.$X)
      - pattern: axios.get(req.query.$X)
      - pattern: axios.post(req.body.$X)

  # ── XSS ──────────────────────────────────────────────────────────────
  - id: js-xss-innerhtml
    message: "XSS: user input assigned directly to innerHTML (CWE-79)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-79"
      confidence: HIGH
    pattern-either:
      - pattern: $EL.innerHTML = req.$X
      - pattern: $EL.innerHTML = req.body.$X
      - pattern: $EL.innerHTML = req.query.$X
      - pattern: document.write(req.$X)

  - id: js-xss-res-send
    message: "XSS: user input returned directly as HTML response (CWE-79)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-79"
      confidence: MEDIUM
    pattern-either:
      - pattern: res.send(req.params.$X)
      - pattern: res.send(req.query.$X)
      - pattern: res.send(req.body.$X)
      - pattern: res.end(req.query.$X)

  # ── Prototype Pollution ───────────────────────────────────────────────
  - id: js-prototype-pollution
    message: "Prototype Pollution: object property set dynamically from user input (CWE-1321)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1321"
      confidence: MEDIUM
    pattern-either:
      - pattern: $OBJ[req.body.$KEY] = req.body.$VALUE
      - pattern: $OBJ[req.query.$KEY] = $VALUE
      - pattern: |
          function $SET($OBJ, $KEY, $VALUE) {
            $OBJ[$KEY] = $VALUE;
          }

  # ── Open Redirect ─────────────────────────────────────────────────────
  - id: js-open-redirect
    message: "Open Redirect: redirect target taken from user input (CWE-601)"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-601"
      confidence: MEDIUM
    pattern-either:
      - pattern: res.redirect(req.query.$X)
      - pattern: res.redirect(req.body.$X)
      - pattern: res.redirect(req.params.$X)

  # ── Insecure Deserialization ──────────────────────────────────────────
  - id: js-deserialize-unserialize
    message: "Insecure Deserialization: node-serialize used — RCE possible (CWE-502)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-502"
      confidence: HIGH
    pattern: serialize.unserialize(...)

  # ── Prompt Injection (AI Agent) ──────────────────────────────────────
  - id: js-prompt-injection-openai
    message: "Prompt Injection: external data inserted into OpenAI API prompt (CWE-1427)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1427"
      confidence: HIGH
    pattern-either:
      - pattern: '$CLIENT.chat.completions.create({..., messages: [..., {role: "user", content: req.$X}, ...], ...})'
      - pattern: '$CLIENT.chat.completions.create({..., messages: [..., {role: "system", content: req.$X}, ...], ...})'
      - pattern: '$CLIENT.chat.completions.create({..., messages: [..., {role: "user", content: req.body.$X}, ...], ...})'

  - id: js-prompt-injection-anthropic
    message: "Prompt Injection: external data inserted into Anthropic API prompt (CWE-1427)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1427"
      confidence: HIGH
    pattern-either:
      - pattern: '$CLIENT.messages.create({..., system: req.$X, ...})'
      - pattern: '$CLIENT.messages.create({..., messages: [..., {role: "user", content: req.$X}, ...], ...})'
      - pattern: '$CLIENT.messages.create({..., system: req.body.$X, ...})'

  - id: js-prompt-injection-langchain
    message: "Prompt Injection: unvalidated external input passed to a LangChain chain/agent (CWE-1427)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1427"
      confidence: MEDIUM
    pattern-either:
      - pattern: $CHAIN.invoke(req.$X)
      - pattern: $CHAIN.invoke(req.body.$X)
      - pattern: '$AGENT.invoke({input: req.$X})'
      - pattern: '$AGENT.invoke({input: req.body.$X})'

  - id: js-llm-output-eval
    message: "LLM Output Execution: LLM response executed as code without validation (CWE-1427)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1427"
      confidence: HIGH
    pattern-either:
      - pattern: eval($RESPONSE.content)
      - pattern: new Function($RESPONSE.content)()
      - pattern: vm.runInNewContext($RESPONSE.content)

  - id: js-mcp-tool-unvalidated-input
    message: "MCP Tool Injection: unvalidated tool arguments processed as-is (CWE-1427)"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1427"
      confidence: MEDIUM
    patterns:
      - pattern-inside: 'server.tool($NAME, $SCHEMA, async ($ARGS) => { ... })'
      - pattern-either:
          - pattern: eval(...)
          - pattern: exec(...)
          - pattern: child_process.$FUNC(...)

  # ── DoS / Resource Exhaustion ────────────────────────────────────────
  - id: js-dos-regex-user-input
    message: "ReDoS: regex built from user input — catastrophic backtracking possible (CWE-400)"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-400"
      confidence: HIGH
    pattern-either:
      - pattern: new RegExp(req.query.$X)
      - pattern: new RegExp(req.params.$X)
      - pattern: new RegExp(req.body.$X)
      - pattern: new RegExp(req.$X)

  - id: js-dos-buffer-alloc-user
    message: "Resource Exhaustion: Buffer allocated using user-supplied size — OOM possible (CWE-400)"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-400"
      confidence: HIGH
    pattern-either:
      - pattern: Buffer.alloc(req.body.$SIZE)
      - pattern: Buffer.alloc(req.query.$SIZE)
      - pattern: Buffer.alloc(parseInt(req.$X))
      - pattern: Buffer.allocUnsafe(req.body.$SIZE)
      - pattern: Buffer.allocUnsafe(req.query.$SIZE)
      - pattern: new Array(req.body.$SIZE)
      - pattern: new Array(parseInt(req.$X))

  - id: js-dos-json-parse-unbounded
    message: "Resource Exhaustion: user-supplied JSON parsed without a size limit (CWE-400)"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-400"
      confidence: MEDIUM
    pattern-either:
      - pattern: JSON.parse(req.body.$X)
      - pattern: JSON.parse(req.query.$X)

  # ── NoSQL Injection ───────────────────────────────────────────────────
  - id: js-nosqli-mongodb
    message: "NoSQL Injection: user input inserted directly into a MongoDB query (CWE-943)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-943"
      confidence: HIGH
    pattern-either:
      - pattern: $COLLECTION.find(req.body)
      - pattern: $COLLECTION.find(req.query)
      - pattern: $COLLECTION.findOne(req.body)
      - pattern: $COLLECTION.findOne(req.query)
      - pattern: "$COLLECTION.find({$X: req.body.$Y})"
