rules:

  # ── SQL Injection ────────────────────────────────────────────────────
  - id: js-sqli-string-concat
    message: "SQL Injection: 문자열 연결로 쿼리 생성 (CWE-89)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-89"
      confidence: HIGH
    pattern-either:
      - pattern: $DB.query("..." + ...)
      - pattern: $DB.query(`...`)
      - pattern: $POOL.query("..." + ...)
      - pattern: $POOL.query(`...`)
      - pattern: $CLIENT.query("..." + ...)
      - pattern: $CLIENT.query(`...`)

  - id: js-sqli-knex-raw
    message: "SQL Injection: knex.raw()에 사용자 입력 삽입 (CWE-89)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-89"
      confidence: HIGH
    pattern-either:
      - pattern: knex.raw(`...`)
      - pattern: knex.raw("..." + ...)
      - pattern: $DB.raw(`...`)

  # ── Command Injection ────────────────────────────────────────────────
  - id: js-cmdi-exec
    message: "Command Injection: exec()에 사용자 입력 포함 (CWE-78)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-78"
      confidence: HIGH
    pattern-either:
      - pattern: exec(`...`)
      - pattern: exec("..." + ...)
      - pattern: execSync(`...`)
      - pattern: execSync("..." + ...)
      - pattern: child_process.exec(`...`)
      - pattern: child_process.exec("..." + ...)

  - id: js-cmdi-eval
    message: "Code Injection: eval()에 사용자 입력 실행 (CWE-94)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-94"
      confidence: HIGH
    pattern-either:
      - pattern: eval(req.$X)
      - pattern: eval(req.body.$X)
      - pattern: eval(req.query.$X)
      - pattern: eval(req.params.$X)
      - pattern: new Function(req.$X)
      - pattern: new Function(req.body.$X)

  # ── Path Traversal ───────────────────────────────────────────────────
  - id: js-path-traversal-readfile
    message: "Path Traversal: 사용자 입력으로 파일 읽기 (CWE-22)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-22"
      confidence: HIGH
    pattern-either:
      - pattern: fs.readFile(req.params.$X, ...)
      - pattern: fs.readFile(req.query.$X, ...)
      - pattern: fs.readFile(req.body.$X, ...)
      - pattern: fs.readFileSync(req.params.$X, ...)
      - pattern: fs.readFileSync(req.query.$X, ...)
      - pattern: path.join($BASE, req.params.$X)
      - pattern: path.join($BASE, req.query.$X)

  # ── SSRF ─────────────────────────────────────────────────────────────
  - id: js-ssrf-fetch
    message: "SSRF: 사용자 제어 URL로 fetch 요청 (CWE-918)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-918"
      confidence: HIGH
    pattern-either:
      - pattern: fetch(req.params.$X)
      - pattern: fetch(req.query.$X)
      - pattern: fetch(req.body.$X)
      - pattern: fetch(`...${req.$X}...`)
      - pattern: axios.get(req.params.$X)
      - pattern: axios.get(req.query.$X)
      - pattern: axios.post(req.body.$X)

  # ── XSS ──────────────────────────────────────────────────────────────
  - id: js-xss-innerhtml
    message: "XSS: innerHTML에 사용자 입력 직접 삽입 (CWE-79)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-79"
      confidence: HIGH
    pattern-either:
      - pattern: $EL.innerHTML = req.$X
      - pattern: $EL.innerHTML = req.body.$X
      - pattern: $EL.innerHTML = req.query.$X
      - pattern: document.write(req.$X)

  - id: js-xss-res-send
    message: "XSS: 사용자 입력이 HTML로 직접 응답됨 (CWE-79)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-79"
      confidence: MEDIUM
    pattern-either:
      - pattern: res.send(req.params.$X)
      - pattern: res.send(req.query.$X)
      - pattern: res.send(req.body.$X)
      - pattern: res.end(req.query.$X)

  # ── Prototype Pollution ───────────────────────────────────────────────
  - id: js-prototype-pollution
    message: "Prototype Pollution: 사용자 입력으로 객체 프로퍼티를 동적 설정 (CWE-1321)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1321"
      confidence: MEDIUM
    pattern-either:
      - pattern: $OBJ[req.body.$KEY] = req.body.$VALUE
      - pattern: $OBJ[req.query.$KEY] = $VALUE
      - pattern: |
          function $SET($OBJ, $KEY, $VALUE) {
            $OBJ[$KEY] = $VALUE;
          }

  # ── Open Redirect ─────────────────────────────────────────────────────
  - id: js-open-redirect
    message: "Open Redirect: 사용자 입력으로 리다이렉트 (CWE-601)"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-601"
      confidence: MEDIUM
    pattern-either:
      - pattern: res.redirect(req.query.$X)
      - pattern: res.redirect(req.body.$X)
      - pattern: res.redirect(req.params.$X)

  # ── Insecure Deserialization ──────────────────────────────────────────
  - id: js-deserialize-unserialize
    message: "Insecure Deserialization: node-serialize 사용 — RCE 가능 (CWE-502)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-502"
      confidence: HIGH
    pattern: serialize.unserialize(...)

  # ── Prompt Injection (AI Agent) ──────────────────────────────────────
  - id: js-prompt-injection-openai
    message: "Prompt Injection: 외부 데이터가 OpenAI API 프롬프트에 삽입됨 (CWE-1427)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1427"
      confidence: HIGH
    pattern-either:
      - pattern: $CLIENT.chat.completions.create({..., messages: [..., {role: "user", content: req.$X}, ...], ...})
      - pattern: $CLIENT.chat.completions.create({..., messages: [..., {role: "system", content: req.$X}, ...], ...})
      - pattern: $CLIENT.chat.completions.create({..., messages: [..., {role: "user", content: req.body.$X}, ...], ...})

  - id: js-prompt-injection-anthropic
    message: "Prompt Injection: 외부 데이터가 Anthropic API 프롬프트에 삽입됨 (CWE-1427)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1427"
      confidence: HIGH
    pattern-either:
      - pattern: $CLIENT.messages.create({..., system: req.$X, ...})
      - pattern: $CLIENT.messages.create({..., messages: [..., {role: "user", content: req.$X}, ...], ...})
      - pattern: $CLIENT.messages.create({..., system: req.body.$X, ...})

  - id: js-prompt-injection-langchain
    message: "Prompt Injection: LangChain 체인/에이전트에 검증되지 않은 외부 입력 전달 (CWE-1427)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1427"
      confidence: MEDIUM
    pattern-either:
      - pattern: $CHAIN.invoke(req.$X)
      - pattern: $CHAIN.invoke(req.body.$X)
      - pattern: $AGENT.invoke({input: req.$X})
      - pattern: $AGENT.invoke({input: req.body.$X})

  - id: js-llm-output-eval
    message: "LLM Output Execution: LLM 응답이 검증 없이 코드로 실행됨 (CWE-1427)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1427"
      confidence: HIGH
    pattern-either:
      - pattern: eval($RESPONSE.content)
      - pattern: new Function($RESPONSE.content)()
      - pattern: vm.runInNewContext($RESPONSE.content)

  - id: js-mcp-tool-unvalidated-input
    message: "MCP Tool Injection: 검증되지 않은 툴 인자가 그대로 처리됨 (CWE-1427)"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-1427"
      confidence: MEDIUM
    pattern-either:
      - pattern: server.tool($NAME, $SCHEMA, async ($ARGS) => { ... eval(...) ... })
      - pattern: server.tool($NAME, $SCHEMA, async ($ARGS) => { ... exec(...) ... })
      - pattern: server.tool($NAME, $SCHEMA, async ($ARGS) => { ... child_process.$FUNC(...) ... })

  # ── DoS / Resource Exhaustion ────────────────────────────────────────
  - id: js-dos-regex-user-input
    message: "ReDoS: 사용자 입력으로 정규식 생성 — 카타스트로픽 백트래킹 가능 (CWE-400)"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-400"
      confidence: HIGH
    pattern-either:
      - pattern: new RegExp(req.query.$X)
      - pattern: new RegExp(req.params.$X)
      - pattern: new RegExp(req.body.$X)
      - pattern: new RegExp(req.$X)

  - id: js-dos-buffer-alloc-user
    message: "Resource Exhaustion: 사용자 입력 크기로 Buffer 할당 — OOM 가능 (CWE-400)"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-400"
      confidence: HIGH
    pattern-either:
      - pattern: Buffer.alloc(req.body.$SIZE)
      - pattern: Buffer.alloc(req.query.$SIZE)
      - pattern: Buffer.alloc(parseInt(req.$X))
      - pattern: Buffer.allocUnsafe(req.body.$SIZE)
      - pattern: Buffer.allocUnsafe(req.query.$SIZE)
      - pattern: new Array(req.body.$SIZE)
      - pattern: new Array(parseInt(req.$X))

  - id: js-dos-json-parse-unbounded
    message: "Resource Exhaustion: 크기 제한 없이 사용자 입력 JSON 파싱 (CWE-400)"
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-400"
      confidence: MEDIUM
    pattern-either:
      - pattern: JSON.parse(req.body.$X)
      - pattern: JSON.parse(req.query.$X)

  # ── NoSQL Injection ───────────────────────────────────────────────────
  - id: js-nosqli-mongodb
    message: "NoSQL Injection: MongoDB 쿼리에 사용자 입력 직접 삽입 (CWE-943)"
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      cwe: "CWE-943"
      confidence: HIGH
    pattern-either:
      - pattern: $COLLECTION.find(req.body)
      - pattern: $COLLECTION.find(req.query)
      - pattern: $COLLECTION.findOne(req.body)
      - pattern: $COLLECTION.findOne(req.query)
      - pattern: "$COLLECTION.find({$X: req.body.$Y})"
