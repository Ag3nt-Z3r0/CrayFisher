rules:

  # ── SQL Injection ────────────────────────────────────────────────────
  - id: python-sqli-string-format
    message: "SQL Injection: user input inserted into query via string formatting (CWE-89)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-89"
      confidence: HIGH
    patterns:
      - pattern-either:
          - pattern: $CURSOR.execute("..." % ...)
          - pattern: $CURSOR.execute("..." + ...)
          - pattern: $CURSOR.execute(f"...")
          - pattern: $CURSOR.execute("...".format(...))
          - pattern: $DB.execute("..." % ...)
          - pattern: $DB.execute("..." + ...)
          - pattern: $DB.execute(f"...")

  - id: python-sqli-raw-query
    message: "SQL Injection: user input may be inserted into ORM raw() or extra() (CWE-89)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-89"
      confidence: MEDIUM
    pattern-either:
      - pattern: $MODEL.objects.raw(f"...")
      - pattern: $MODEL.objects.raw("..." % ...)
      - pattern: $MODEL.objects.raw("..." + ...)
      - pattern: $MODEL.objects.extra(where=[f"..."])

  # ── Command Injection ────────────────────────────────────────────────
  - id: python-cmdi-os-system
    message: "Command Injection: os.system() may contain user input (CWE-78)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-78"
      confidence: HIGH
    pattern-either:
      - pattern: os.system(f"...")
      - pattern: os.system("..." + ...)
      - pattern: os.system("..." % ...)

  - id: python-cmdi-subprocess-shell
    message: "Command Injection: subprocess called with shell=True and a variable (CWE-78)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-78"
      confidence: HIGH
    patterns:
      - pattern: subprocess.$FUNC(..., shell=True, ...)
      - pattern-not: subprocess.$FUNC(["..."], shell=True, ...)

  - id: python-cmdi-popen-shell
    message: "Command Injection: os.popen() may contain user input (CWE-78)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-78"
      confidence: MEDIUM
    pattern-either:
      - pattern: os.popen(f"...")
      - pattern: os.popen("..." + ...)

  # ── Path Traversal ───────────────────────────────────────────────────
  - id: python-path-traversal-open
    message: "Path Traversal: file opened with user input without validation (CWE-22)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-22"
      confidence: MEDIUM
    pattern-either:
      - pattern: open(request.$X, ...)
      - pattern: open($REQUEST.args.get(...), ...)
      - pattern: open($REQUEST.form.get(...), ...)
      - pattern: open($REQUEST.json.get(...), ...)
      - pattern: open($REQUEST.params.get(...), ...)

  - id: python-path-traversal-pathlib
    message: "Path Traversal: Path built from user input without validation (CWE-22)"
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-22"
      confidence: LOW
    pattern-either:
      - pattern: Path(request.$X)
      - pattern: Path($BASE) / request.$X

  # ── SSRF ─────────────────────────────────────────────────────────────
  - id: python-ssrf-requests
    message: "SSRF: outbound request to a user-controlled URL (CWE-918)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-918"
      confidence: MEDIUM
    pattern-either:
      - pattern: requests.get(request.$X, ...)
      - pattern: requests.get($REQUEST.args.get(...), ...)
      - pattern: requests.post(request.$X, ...)
      - pattern: requests.post($REQUEST.args.get(...), ...)
  - id: python-ssrf-urllib
    message: "SSRF: urllib request to a user-controlled URL (CWE-918)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-918"
      confidence: MEDIUM
    pattern-either:
      - pattern: urllib.request.urlopen(request.$X)
      - pattern: urllib.request.urlopen($REQUEST.args.get(...))

  # ── Insecure Deserialization ─────────────────────────────────────────
  - id: python-pickle-loads
    message: "Insecure Deserialization: untrusted data deserialized via pickle.loads() (CWE-502)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-502"
      confidence: HIGH
    pattern-either:
      - pattern: pickle.loads(request.$X)
      - pattern: pickle.loads($REQUEST.data)
      - pattern: pickle.loads($REQUEST.body)
      - pattern: pickle.load(...)

  - id: python-yaml-load-unsafe
    message: "Insecure Deserialization: yaml.load() used — prefer yaml.safe_load() (CWE-502)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-502"
      confidence: HIGH
    patterns:
      - pattern: yaml.load(...)
      - pattern-not: yaml.load(..., Loader=yaml.SafeLoader)
      - pattern-not: yaml.load(..., Loader=yaml.BaseLoader)

  # ── Code Injection ────────────────────────────────────────────────────
  - id: python-eval-injection
    message: "Code Injection: user input executed via eval() (CWE-94)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-94"
      confidence: HIGH
    pattern-either:
      - pattern: eval(request.$X)
      - pattern: eval($REQUEST.args.get(...))
      - pattern: eval($REQUEST.form.get(...))
      - pattern: exec(request.$X)
      - pattern: exec($REQUEST.args.get(...))

  # ── Template Injection ────────────────────────────────────────────────
  - id: python-ssti-jinja2
    message: "SSTI: user input embedded directly into a Jinja2 template (CWE-94)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-94"
      confidence: HIGH
    pattern-either:
      - pattern: jinja2.Template(request.$X)
      - pattern: jinja2.Template($REQUEST.args.get(...))
      - pattern: render_template_string(request.$X)
      - pattern: render_template_string(f"...")

  # ── XSS (server-side) ────────────────────────────────────────────────
  - id: python-xss-flask-response
    message: "XSS: user input returned as an HTML response without escaping (CWE-79)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-79"
      confidence: MEDIUM
    pattern-either:
      - pattern: return request.$X
      - pattern: 'return $REQUEST.args.get(...), 200, {"Content-Type": "text/html"}'
      - pattern: Response(request.$X, mimetype="text/html")

  # ── Open Redirect ─────────────────────────────────────────────────────
  - id: python-open-redirect
    message: "Open Redirect: redirect target taken from user input (CWE-601)"
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-601"
      confidence: MEDIUM
    pattern-either:
      - pattern: redirect(request.$X)
      - pattern: redirect($REQUEST.args.get(...))
      - pattern: redirect($REQUEST.form.get(...))

  # ── Prompt Injection (AI Agent) ──────────────────────────────────────
  - id: python-prompt-injection-anthropic
    message: "Prompt Injection: external data inserted into Anthropic API prompt (CWE-1427)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-1427"
      confidence: HIGH
    pattern-either:
      - pattern: $CLIENT.messages.create(..., system=request.$X, ...)
      - pattern: $CLIENT.messages.create(..., system=f"...", ...)
      - pattern: '$CLIENT.messages.create(..., messages=[..., {"role": "user", "content": request.$X}, ...], ...)'
      - pattern: $CLIENT.beta.messages.create(..., system=request.$X, ...)

  - id: python-prompt-injection-openai
    message: "Prompt Injection: external data inserted into OpenAI API prompt (CWE-1427)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-1427"
      confidence: HIGH
    pattern-either:
      - pattern: '$CLIENT.chat.completions.create(..., messages=[..., {"role": "user", "content": request.$X}, ...], ...)'
      - pattern: '$CLIENT.chat.completions.create(..., messages=[..., {"role": "system", "content": request.$X}, ...], ...)'

  - id: python-prompt-injection-langchain
    message: "Prompt Injection: unvalidated external input passed to a LangChain chain/agent (CWE-1427)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-1427"
      confidence: MEDIUM
    pattern-either:
      - pattern: $CHAIN.invoke(request.$X)
      - pattern: $CHAIN.invoke($REQUEST.args.get(...))
      - pattern: $AGENT.run(request.$X)
      - pattern: $TOOL.run(request.$X)

  - id: python-llm-output-exec
    message: "LLM Output Execution: LLM response executed as code/shell without validation (CWE-1427)"
    severity: ERROR
    languages: [python]
    metadata:
      cwe: "CWE-1427"
      confidence: HIGH
    pattern-either:
      - pattern: eval($RESPONSE.content)
      - pattern: exec($RESPONSE.content)
      - pattern: os.system($RESPONSE.content)
      - pattern: subprocess.run($RESPONSE.content, ..., shell=True, ...)

  # ── DoS / Resource Exhaustion ────────────────────────────────────────
  - id: python-redos-user-regex
    message: "ReDoS: regex compiled/executed from user input — catastrophic backtracking possible (CWE-400)"
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-400"
      confidence: HIGH
    pattern-either:
      - pattern: re.compile(request.$X)
      - pattern: re.compile($REQUEST.args.get(...))
      - pattern: re.match(request.$X, ...)
      - pattern: re.search(request.$X, ...)
      - pattern: re.findall(request.$X, ...)

  - id: python-dos-zip-bomb
    message: "Zip Bomb: user-supplied archive extracted without a size check — DoS possible (CWE-400)"
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-400"
      confidence: HIGH
    pattern-either:
      - pattern: zipfile.ZipFile(request.$X).extractall(...)
      - pattern: zipfile.ZipFile($REQUEST.files.get(...)).extractall(...)
      - pattern: tarfile.open(request.$X).extractall(...)
      - pattern: $ZF.extractall(...)

  - id: python-dos-xml-bomb
    message: "XML Bomb: untrusted XML parsed — Billion Laughs attack possible (CWE-400)"
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-400"
      confidence: HIGH
    pattern-either:
      - pattern: xml.etree.ElementTree.parse(request.$X)
      - pattern: xml.etree.ElementTree.fromstring(request.$X)
      - pattern: ET.parse(request.$X)
      - pattern: ET.fromstring(request.$X)
      - pattern: lxml.etree.fromstring(request.$X)

  # ── Hardcoded Secrets ─────────────────────────────────────────────────
  - id: python-hardcoded-secret-key
    message: "Hardcoded Secret: secret key/password hardcoded in source"
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-798"
      confidence: MEDIUM
    pattern-either:
      - pattern: SECRET_KEY = "..."
      - pattern: $APP.secret_key = "..."
      - pattern: password = "..."
      - pattern: api_key = "..."
      - pattern: AWS_SECRET = "..."
