rules:

  # ─────────────────────────────────────────────────────────────────────
  # Incomplete-fix heuristics — text-level. Source-code analogues of the
  # commit-log heuristics that `tools/incomplete_fix_scan.py` runs over
  # git history. These rules surface code that *cites* a prior fix in
  # comments / strings, so the file becomes a Phase 3 priority read.
  #
  # See:
  #   skills/04-validate/policies/incomplete-fix.md
  #   skills/knowledge/agent-zero-db-distill.md (G1–G4, Patterns A–E)
  # ─────────────────────────────────────────────────────────────────────

  - id: incomplete-fix-comment-self-disclosed
    message: "Source comment self-discloses an incomplete fix / bypass. Anchor for Phase 3 read."
    severity: WARNING
    languages: [python, typescript, javascript, generic]
    metadata:
      cwe: "CWE-1395"
      confidence: HIGH
      family: incomplete-fix
    pattern-regex: '(?i)(incomplete fix|incomplete patch|bypass for|variant of|see also CVE-\d{4}-\d{4,7})'

  - id: incomplete-fix-ghsa-citation
    message: "Source cites a prior GHSA id — patch-neighborhood read needed (Pattern A/B)."
    severity: WARNING
    languages: [python, typescript, javascript, generic]
    metadata:
      cwe: "CWE-1395"
      confidence: MEDIUM
      family: incomplete-fix
    pattern-regex: 'GHSA-[0-9a-z]{4}-[0-9a-z]{4}-[0-9a-z]{4}'

  - id: incomplete-fix-cve-citation
    message: "Source cites a CVE id — check whether the neighborhood is fully covered (Pattern A)."
    severity: INFO
    languages: [python, typescript, javascript, generic]
    metadata:
      cwe: "CWE-1395"
      confidence: LOW
      family: incomplete-fix
    pattern-regex: 'CVE-\d{4}-\d{4,7}'

  - id: denylist-style-blocklist-string-list-py
    message: "Denylist-style env-var / token check. Cross-check against env_denylist_known_bypass_seeds (Pattern D)."
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-184"
      confidence: LOW
      family: incomplete-fix
    pattern-either:
      - pattern: |
          $X not in [...]
      - pattern: |
          if $K not in BLOCKED_ENVS:
              ...
      - pattern: |
          if $K not in DENYLIST:
              ...

  - id: denylist-style-blocklist-string-list-ts
    message: "Denylist-style env-var / token check. Cross-check against env_denylist_known_bypass_seeds (Pattern D)."
    severity: WARNING
    languages: [typescript, javascript]
    metadata:
      cwe: "CWE-184"
      confidence: LOW
      family: incomplete-fix
    pattern-either:
      - pattern: |
          !DENYLIST.includes($X)
      - pattern: |
          !BLOCKED_ENVS.includes($K)

  - id: validation-after-parse-py
    message: "Validation runs after a parser handled untrusted bytes. Earlier-layer trigger possible (Pattern C)."
    severity: WARNING
    languages: [python]
    metadata:
      cwe: "CWE-1395"
      confidence: LOW
      family: incomplete-fix
    pattern: |
      $BODY = $REQ.body
      ...
      validate($BODY)

  - id: per-vector-policy-keyword-py
    message: "A workspace-policy keyword appears here — enumerate every file enforcing it (Pattern E)."
    severity: WARNING
    languages: [python, typescript, javascript, generic]
    metadata:
      cwe: "CWE-1395"
      confidence: LOW
      family: incomplete-fix
    pattern-regex: '(workspace[_-]only|allow_outside_workspace|workspace_policy)\b'

  - id: incomplete-fix-todo-or-fixme-with-cve-or-ghsa
    message: "TODO / FIXME comment that references CVE / GHSA — strong incomplete-fix anchor."
    severity: WARNING
    languages: [python, typescript, javascript, generic]
    metadata:
      cwe: "CWE-1395"
      confidence: HIGH
      family: incomplete-fix
    pattern-regex: '(?i)(?:TODO|FIXME|XXX|HACK).{0,80}(?:CVE-\d{4}-\d{4,7}|GHSA-[0-9a-z]{4}-[0-9a-z]{4}-[0-9a-z]{4})'
